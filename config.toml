[theme]
name = "terminal"        # See --help for full list (30 themes)

[window]
position = "bottom"      # "bottom" or "top"
bottom_margin = 20
opacity = 0.95           # 0.0-1.0 (1.0 = fully opaque)

[keys]
unit_size = 0            # 0 = auto-scale based on scale %, or fixed pixel size
padding = 4
font_size = 0            # 0 = auto-scale relative to unit_size
scale = 70               # percentage of screen width (30-100)

[gamepad]
device = ""              # empty = auto-detect, or path like /dev/input/gamepad0
grab = true              # grab device when visible (prevents input bleed to game)
deadzone = 0.25
long_press_ms = 500
swap_xy = "auto"         # "auto" = detect Xbox 360, "true" = force swap, "false" = no swap
nav_stick = "left"       # "left" or "right" — which stick navigates keyboard
mouse_stick = "right"    # "left" or "right" — which stick moves mouse cursor

[gamepad.buttons]        # button names: a, b, x, y, lb, rb, lt, rt, l3, r3, start, select
press = "a"              # press highlighted key
close = "b"              # close keyboard
backspace = "x"          # backspace
space = "y"              # space
caps = "l3"              # caps lock toggle
shift = "lt"             # shift (hold)
enter = "rt"             # enter
left_click = "rb"        # left mouse button (hold to drag)
right_click = "lb"       # right mouse button
position_toggle = "start" # toggle keyboard top/bottom

[mouse]
enabled = true
sensitivity = 8          # 1-50, higher = faster cursor
